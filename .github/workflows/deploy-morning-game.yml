name: Deploy Morning Rewire to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/adhd-morning-game-YPgZY
    paths:
      - 'morning-game/**'
      - '.github/workflows/deploy-morning-game.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage site
        run: |
          mkdir -p _site
          cp -R morning-game/* _site/
          # Pages serves index.html by default — already what we want.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
